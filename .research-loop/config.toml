# Research Loop configuration
# Generated by research-loop init

[llm]
provider     = "claude-code"
model        = "claude-sonnet-4-5"
api_key_env  = "ANTHROPIC_API_KEY"

# Per-agent model overrides (optional)
# [agents.epistemic]
# model = "claude-sonnet-4-5"
# [agents.empirical]
# model = "claude-haiku-4-5"

[metric]
name              = "val_loss"
direction         = "lower"
baseline_command  = ""
benchmark_command = ""
timeout           = 300
